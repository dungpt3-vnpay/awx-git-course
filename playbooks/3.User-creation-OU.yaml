---
- name: Tạo mới hoặc cập nhật Password cho User trong OU
  hosts: all
  gather_facts: false
  collections:
    - microsoft.ad
    - ansible.windows

  vars:
    # Các biến này sẽ nhận từ Survey trên AWX
    new_username: "user_test_01"
    new_password: "Password123456!"
    target_ou_dn: "OU=System,OU=HOMEUSERS,DC=test,DC=lab"
    user_firstname: "Dung"
    user_lastname: "Pham Tien"

  tasks:
    # ─────────────────────────────────────────
    # DEBUG: Xác định user đang thực thi
    # ─────────────────────────────────────────
    - name: 0. Kiểm tra user đang thực thi playbook
      ansible.windows.win_shell: |
        Write-Output "whoami      : $(whoami)"
        Write-Output "displayname : $((Get-ADUser -Identity $env:USERNAME -Properties DisplayName).DisplayName)"
      register: runner_info
      ignore_errors: true   # phòng trường hợp AD module chưa sẵn sàng

    - name: 0. Hiển thị thông tin user thực thi
      ansible.builtin.debug:
        msg: "{{ runner_info.stdout_lines }}"

    # ─────────────────────────────────────────
    # MAIN TASKS
    # ─────────────────────────────────────────
    - name: 1. Kiểm tra OU mục tiêu có tồn tại không
      microsoft.ad.object_info:
        identity: "{{ target_ou_dn | replace('\"', '') | trim }}"
      register: ou_info

    - name: 2. Dừng lại nếu OU không tồn tại
      ansible.builtin.fail:
        msg: "Lỗi: Không tìm thấy OU tại đường dẫn {{ target_ou_dn }}."
      when: ou_info.objects | length == 0

    - name: 3. Kiểm tra User đã tồn tại chưa
      microsoft.ad.object_info:
        identity: "{{ new_username }}"
      register: user_check
      # Nếu user chưa tồn tại module sẽ trả về objects = []
      # không raise lỗi nên không cần ignore_errors

    - name: 4. Thông báo trạng thái User
      ansible.builtin.debug:
        msg: >-
          {{ "User '" + new_username + "' đã tồn tại. Sẽ thực hiện cập nhật Password."
          if user_check.objects | length > 0
          else "User '" + new_username + "' chưa có. Sẽ thực hiện tạo mới." }}

    - name: 5. Thực hiện Tạo mới hoặc Cập nhật User
      microsoft.ad.user:
        name:         "{{ new_username }}"
        firstname:    "{{ user_firstname | trim }}"
        surname:      "{{ user_lastname | trim }}"
        # Display Name hiển thị đúng "Dung Pham Tien" (firstname + lastname)
        display_name: "{{ user_firstname | trim }} {{ user_lastname | trim }}"
        sam_account_name: "{{ new_username }}"
        password:     "{{ new_password }}"
        path:         "{{ target_ou_dn | replace('\"', '') | trim }}"
        state:        present
        enabled:      true
        password_never_expires: false
        update_password: always
      register: user_result

    - name: 6. Xác nhận kết quả cuối cùng
      ansible.builtin.debug:
        msg: >-
          {{ 'KẾT QUẢ: Đã tạo mới User thành công.' if user_check.objects | length == 0
          else 'KẾT QUẢ: Đã cập nhật mật khẩu cho User thành công.' }}
          | Display Name: {{ user_firstname | trim }} {{ user_lastname | trim }}
          | OU: {{ target_ou_dn }}
      when: user_result.changed
