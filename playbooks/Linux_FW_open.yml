---
- name: Open Firewall Ports on Linux Clients
  hosts: all
  become: yes  # Bắt buộc phải có để chạy với quyền root
  
  tasks:
    - name: Parse YAML input from Survey
      set_fact:
        input_data: "{{ raw_yaml_input | from_yaml }}"
      run_once: true

    - name: Map variables from parsed YAML
      set_fact:
        ip_nguon: "{{ input_data.ip_nguon | default([]) }}"
        ip_dich: "{{ input_data.ip_dich | default([]) }}"
        ports: "{{ input_data.ports | default([]) }}"

    # Dành cho RHEL/CentOS
    - name: Configure firewalld (RHEL)
      firewalld:
        source: "{{ item.0 }}"
        port: "{{ item.1 }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      with_nested:
        - "{{ ip_nguon }}"
        - "{{ ports }}"
      when: ansible_os_family == "RedHat"

    # Dành cho Ubuntu (Sửa lại logic loop để tránh lỗi 'to_ip' nếu không cần thiết)
    - name: Configure ufw (Ubuntu)
      ufw:
        rule: allow
        from_ip: "{{ item.0 }}"
        port: "{{ item.1 | string }}"
        proto: tcp
      with_nested:
        - "{{ ip_nguon }}"
        - "{{ ports }}"
      when: ansible_os_family == "Debian"
