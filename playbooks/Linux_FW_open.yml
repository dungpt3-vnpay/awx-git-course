---
- name: Open Firewall Ports
  hosts: all
  become: yes             # BẮT BUỘC CÓ DÒNG NÀY ĐỂ CHẠY ROOT
  gather_facts: yes
  tasks:
    # Cho máy Ubuntu (.133)
    - name: Ensure ufw is configured
      community.general.ufw:
        rule: allow
        from_ip: "{{ item.0 }}"
        port: "{{ item.1 | string }}"
        proto: tcp
      with_nested:
        - "{{ ip_nguon }}"
        - "{{ ports }}"
      when: ansible_os_family == "Debian"

    # Cho máy CentOS (.129)
    - name: Ensure firewalld is configured
      ansible.posix.firewalld:
        rich_rule: 'rule family="ipv4" source address="{{ item.0 }}" port port="{{ item.1 }}" protocol="tcp" accept'
        permanent: yes
        state: enabled
        immediate: yes
      with_nested:
        - "{{ ip_nguon }}"
        - "{{ ports }}"
      when: ansible_os_family == "RedHat"
