---
- name: Open Firewall Ports on Linux Clients
  hosts: all
  become: yes
  tasks:
    - name: Ensure firewalld is configured (RHEL/CentOS)
      firewalld:
        source: "{{ item.0 }}"
        port: "{{ item.1 }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      with_nested:
        - "{{ ip_nguon }}"
        - "{{ ports }}"
      when: ansible_os_family == "RedHat"

    - name: Ensure ufw is configured (Ubuntu/Debian)
      ufw:
        rule: allow
        from_ip: "{{ item.0 }}"
        to_ip: "{{ item.1 }}"
        port: "{{ item.2 | string }}"
        proto: tcp
      with_nested:
        - "{{ ip_nguon }}"
        - "{{ ip_dich }}"
        - "{{ ports }}"
      when: ansible_os_family == "Debian"
