---
- name: Open Firewall Ports on Linux Clients
  hosts: all
  become: yes
  tasks:
    - name: Ensure firewalld is configured (RHEL/CentOS)
      firewalld:
        source: "{{ item.0 }}"
        port: "{{ item.1 }}/tcp"
        permanent: yes
        state: enabled
        immediate: yes
      with_nested:
        - "{{ ip_nguon }}"
        - "{{ ports }}"
      when: ansible_os_family == "RedHat"
